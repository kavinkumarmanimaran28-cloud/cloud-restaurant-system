<!DOCTYPE html>
<html>
<head>
    <title>Admin Login | Cloud Restaurant</title>
    <link rel="stylesheet" href="css/admin-login.css">
</head>
<body>

<div class="login-card">

    <h1>Admin Login</h1>

    <form id="adminLoginForm">

        <input
            type="email"
            id="email"
            placeholder="Admin Email"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <p id="errorMsg"></p>

</div>

<script src="js/admin-login.js"></script>

</body>
</html>
